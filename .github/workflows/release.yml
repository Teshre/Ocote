# release.yml — Build (Linux + Windows) + release draft
#
# macOS se genera LOCALMENTE (evita el costo de runners macOS en CI).
# Flujo completo para un release:
#   1. En tu Mac: pnpm tauri build     → produce .dmg + .app.tar.gz
#   2. En tu Mac: scripts/generate-latest-json.mjs → produce latest.json
#   3. git tag v0.6.0; git push origin v0.6.0
#   4. Esperar ~10 min a que CI suba Linux + Windows al borrador
#   5. Subir .dmg + .app.tar.gz + .sig + latest.json de macOS manualmente
#   6. Ir a GitHub → Releases → publicar el borrador
#
# Artefactos generados por CI:
#   Windows → Ocote_0.6.0_x64-setup.exe
#   Linux   → Ocote_0.6.0_amd64.AppImage / .deb

name: Release

on:
  push:
    tags:
      - 'v*'   # dispara en: v0.6.0, v1.0.0, v1.2.3-beta, etc.

jobs:
  release:
    # Permisos explícitos: el GITHUB_TOKEN por defecto es read-only en
    # contents, lo que rompe "create a release". `contents: write` permite
    # a tauri-action crear el draft release y subir los assets.
    permissions:
      contents: write
    # Sin `environment:` → lee los secrets a nivel de repositorio.
    # (Los environment secrets tienen un bug con tauri-action v0: el valor llega vacío.)
    strategy:
      fail-fast: false   # si un build falla, los otros dos siguen corriendo
      matrix:
        platform:
          - ubuntu-22.04      # compila .AppImage y .deb
          - windows-latest    # compila .exe (NSIS installer)

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Rust ──────────────────────────────────────────────────────────
      - name: Instalar Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cache de dependencias Rust para builds más rápidos en la segunda vez
      - name: Cache de Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 3. Node.js + pnpm ────────────────────────────────────────────────
      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # ── 4. Dependencias de sistema (solo Linux) ──────────────────────────
      # WebKit2GTK y otras libs nativas que Tauri necesita en Linux.
      # No se necesitan en macOS ni Windows porque usan webviews del SO.
      - name: Dependencias de sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      # ── 5. Dependencias de frontend ──────────────────────────────────────
      - name: Instalar dependencias de frontend
        run: pnpm install

      # ── 6. Clave updater: secret → archivo ────────────────────────────────
      # La clave privada de minisign es multi-línea (PEM-like, ~590 bytes).
      # Cuando GitHub la expande en una env var, a veces introduce/saca
      # newlines y el bundler de minisign falla con "Invalid symbol 10,
      # offset 464" (byte \n inesperado).
      #
      # Truco: escribir el contenido del secret a un archivo y pasarle al
      # bundler la RUTA del archivo. El bundler detecta el path (Path::exists)
      # y lee el archivo directo, sin pasar por la expansión del env var.
      - name: Escribir clave updater a archivo
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # RUNNER_TEMP es cross-platform (Linux/macOS/Windows).
          # En Windows con bash, traducimos backslashes a forward slashes.
          KEY_DIR="${RUNNER_TEMP//\\/\/}"
          KEY_FILE="$KEY_DIR/ocote.key"
          # printf '%s' NO agrega newline final — escribe el contenido exacto.
          printf '%s' "$RAW_KEY" > "$KEY_FILE"
          echo "Key file: $KEY_FILE ($(wc -c < "$KEY_FILE") bytes)"
          echo "Head: $(head -c 30 "$KEY_FILE")"

      # ── 7. Build Tauri ───────────────────────────────────────────────────
      # tauri-action maneja todo: cargo build --release, code signing macOS,
      # notarización, generación de latest.json (para auto-updater), creación
      # del GitHub Release y subida de artefactos.
      #
      # Los secrets se pasan como env vars — tauri-action los lee y los usa
      # para firmar el binario macOS y para firmar el latest.json del updater.
      - name: Build y publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (todas las plataformas necesitan firmar
          # latest.json con la misma clave privada).
          # IMPORTANTE 1: el bundler de tauri-cli 1.6.3 lee TAURI_PRIVATE_KEY
          # (no TAURI_SIGNING_PRIVATE_KEY — eso es tauri 1.8+ / CLI más nuevo).
          # IMPORTANTE 2: pasamos la RUTA del archivo (no el contenido) para
          # evitar que GitHub meta/saca newlines al expandir el secret.
          # IMPORTANTE 3: el bundler lee el password de TAURI_KEY_PASSWORD
          # (no TAURI_PRIVATE_KEY_PASSWORD). Si la var no está y CI=true,
          # el bundler usa string vacío como password → "Wrong password"
          # para claves con password real.
          TAURI_PRIVATE_KEY: ${{ runner.temp }}/ocote.key
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Nota: macOS se builda localmente. Las variables APPLE_* existen en
          # secrets si alguna vez volvés a agregar macos-latest al matrix.
        with:
          tagName: ${{ github.ref_name }}         # ej: v0.6.0
          releaseName: 'Ocote ${{ github.ref_name }}'
          releaseBody: |
            ## Ocote ${{ github.ref_name }}

            Terminal offline, sin IA, hecha para humanos.

            ### Instalación
            - **macOS**: descarga el `.dmg`, ábrelo y arrastra Ocote a Aplicaciones
            - **Windows**: descarga el `.exe` y sigue el instalador
            - **Linux**: descarga el `.AppImage`, dale permisos con `chmod +x` y ejecútalo

            ---
            Consulta [CHANGELOG.md](https://github.com/Teshre/Ocote/blob/main/CHANGELOG.md) para ver los cambios de esta versión.
          releaseDraft: true      # crea el release como borrador — tú decides cuándo publicar
          prerelease: false
          # includeUpdaterJson: true (es el default) — genera latest.json
          # para que el auto-updater lo descargue

